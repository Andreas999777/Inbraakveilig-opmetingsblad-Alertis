                <div><label class="block text-[10px] font-bold text-red-600 uppercase mb-1 tracking-wider">Datum</label><input type="text" id="displayDate" class="input-field"></div>
                <div>
                    <label class="block text-[10px] font-bold text-red-600 uppercase mb-1 tracking-wider">BTW Tarief</label>
                    <select id="btwSelect" class="input-field bg-white" onchange="updateGrandTotal(); autoSave();">
                        <option value="21">21%</option>
                        <option value="6">6%</option>
                        <option value="0">0% (Medecontractant / Verlegd)</option>
                    </select>

        <div class="card p-6 border-t-4 border-green-600 bg-green-50 mb-6 no-print" id="grand-total-card">

            <div class="flex justify-between mb-2 text-gray-700"><span>BTW (<span id="sumBtwLabel">21%</span>):</span><span id="sumBtw" class="font-bold">€ 0,00</span></div>
            <div class="flex justify-between text-lg border-t border-green-200 pt-3 mt-2"><strong>Totaal Incl. BTW:</strong><strong id="sumIncl" class="text-green-700 text-xl">€ 0,00</strong></div>

        function reindexDoors() {
            document.querySelectorAll('.door-badge-num').forEach((badge, index) => { badge.innerText = index + 1; });
            updateGrandTotal();
        }

        function updateDoorTitle(input) {
            const label = input.closest('.door-section').querySelector('.door-title-text');
            const val = input.value.trim();
            label.innerText = (val && val !== '...') ? `DEUR: ${val}` : "Klap Open/Toe";
        }

        function updateGrandTotal() {
            let totalExcl = 0;
            document.querySelectorAll('.art-check:checked').forEach(cb => {
                totalExcl += parseFloat(cb.dataset.p) || 0;
            });

            const btwSelect = document.getElementById('btwSelect');
            const btwPerc = parseFloat(btwSelect.value) || 0;
            const btwAmount = totalExcl * (btwPerc / 100);
            const totalIncl = totalExcl + btwAmount;

            document.getElementById('sumExcl').innerText = `€ ${totalExcl.toFixed(2).replace('.', ',')}`;
            document.getElementById('sumBtwLabel').innerText = btwSelect.options[btwSelect.selectedIndex].text;
            document.getElementById('sumBtw').innerText = `€ ${btwAmount.toFixed(2).replace('.', ',')}`;
            document.getElementById('sumIncl').innerText = `€ ${totalIncl.toFixed(2).replace('.', ',')}`;
        }

        function calculateTotals(el) {
            const section = el.closest('.door-section');
            const checkboxes = section.querySelectorAll('.art-check:checked');
            let totalHours = 0; let totalPrice = 0;
            checkboxes.forEach(cb => {
                totalHours += parseFloat(cb.dataset.t) || 0;
                totalPrice += parseFloat(cb.dataset.p) || 0;
            });
            const hoursInput = section.querySelector('.door-hours');
            if (totalHours > 0) {
                let h = Math.floor(totalHours); let m = Math.round((totalHours - h) * 60);
                hoursInput.value = `${h} uur ${m > 0 ? m + ' min' : ''}`.trim();
            } else { hoursInput.value = '...'; }
            const priceInput = section.querySelector('.door-price');
            priceInput.value = totalPrice > 0 ? `€ ${totalPrice.toFixed(2).replace('.', ',')}` : '...';
            
            updateGrandTotal();
        }

        function addDoor(data = null) {
            const container = document.getElementById('doors-container');
            const div = document.createElement('div');
            const timestamp = Date.now();
            div.className = "card door-section overflow-hidden relative";
            div.innerHTML = `
                <div class="no-print bg-red-50 p-3 flex justify-between items-center cursor-pointer border-b border-red-100" onclick="this.parentElement.classList.toggle('collapsed')">
                    <div class="flex items-center gap-3">
                        <span class="door-badge-num bg-red-600 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold shadow-sm">0</span>
                        <span class="door-title-text text-red-700 font-bold uppercase text-xs tracking-wider italic">Klap Open/Toe</span>
                    </div>
                    <button onclick="event.stopPropagation(); this.closest('.door-section').remove(); reindexDoors(); autoSave();" class="bg-red-600 text-white px-3 py-1 rounded text-[10px] font-bold uppercase hover:bg-red-800 shadow-sm">Verwijder</button>
                </div>
                <div class="door-content p-6">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Plaats</label><input type="text" class="input-field door-loc" value="..." oninput="updateDoorTitle(this); autoSave()"></div>
                        <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Type Deur</label><input type="text" class="input-field door-type" value="..." oninput="autoSave()"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-1 mb-4 border-y border-red-50 py-4 max-h-96 overflow-y-auto">
                        ${artikelen.map(a => `
                            <label class="flex items-center gap-2 text-[11px] hover:bg-red-50 rounded p-1 cursor-pointer">
                                <input type="checkbox" class="art-check" data-n="${a.n}" data-t="${a.t}" data-p="${a.p}" onchange="calculateTotals(this); autoSave()"> 
                                <span class="flex-1"><strong>${a.n}</strong> - ${a.d}</span>
                                <span class="text-green-700 font-bold">€ ${a.p.toFixed(2).replace('.', ',')}</span>
                            </label>`).join('')}
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="block text-[10px] font-bold text-red-600 uppercase mb-1 tracking-wider">Werkuren (Interne Calculatie)</label><input type="text" class="input-field door-hours" value="..." readonly></div>
                        <div><label class="block text-[10px] font-bold text-red-600 uppercase mb-1 tracking-wider">Totaal Deur (Excl. BTW)</label><input type="text" class="input-field door-price text-green-700 font-bold" value="..." readonly></div>
                    </div>
                    <div><label class="block text-[10px] font-bold text-red-600 uppercase mb-1 tracking-wider">Opmerkingen</label><input type="text" class="input-field door-notes" value="..." oninput="autoSave()"></div>
                    
                    <div class="no-print mt-6 bg-red-50 p-4 rounded-lg border border-dashed border-red-200">
                        <label class="block text-[10px] font-bold text-red-700 uppercase mb-2">Foto's & Camera:</label>
                        <div class="flex gap-2">
                            <input type="file" multiple accept="image/*" class="hidden" id="file-${timestamp}" onchange="handleImgs(event, this)">
                            <button onclick="document.getElementById('file-${timestamp}').click()" class="action-button bg-slate-800 text-white text-[11px]">📂 Foto's Toevoegen</button>
                            
                            <input type="file" accept="image/*" capture="environment" class="hidden" id="cam-${timestamp}" onchange="handleImgs(event, this)">
                            <button onclick="document.getElementById('cam-${timestamp}').click()" class="action-button bg-red-600 text-white text-[11px]">📸 Camera</button>

                        <div class="photo-area flex flex-wrap mt-3"></div>
                    </div>
                </div>

            if(data) fillDoorData(div, data);
            reindexDoors();
        }

        function handleImgs(e, input) {
            const area = input.closest('.door-section').querySelector('.photo-area');
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = res => {
                    const imgDiv = document.createElement('div');
                    imgDiv.className = "relative inline-block";
                    imgDiv.innerHTML = `<img src="${res.target.result}" class="photo-preview-img shadow-md"><button onclick="this.parentElement.remove(); autoSave();" class="absolute -top-1 -right-1 bg-red-600 text-white rounded-full w-5 h-5 text-xs">×</button>`;
                    area.appendChild(imgDiv);
                    autoSave();
                };
                reader.readAsDataURL(file);
            });
        }

        function fillDoorData(div, d) {
            div.querySelector('.door-loc').value = d.location || '...';
            div.querySelector('.door-type').value = d.type || '...';
            div.querySelector('.door-notes').value = d.notes || '...';
            if(d.items) d.items.forEach(n => {
                const cb = div.querySelector(`.art-check[data-n="${n}"]`);
                if(cb) cb.checked = true;
            });
            calculateTotals(div.querySelector('.art-check'));
            if(d.photos) {
                const area = div.querySelector('.photo-area');
                d.photos.forEach(src => {
                    const imgDiv = document.createElement('div');
                    imgDiv.className = "relative inline-block";
                    imgDiv.innerHTML = `<img src="${src}" class="photo-preview-img shadow-md"><button onclick="this.parentElement.remove(); autoSave();" class="absolute -top-1 -right-1 bg-red-600 text-white rounded-full w-5 h-5 text-xs">×</button>`;
                    area.appendChild(imgDiv);
                });
            }
        }

        function getFormData() {
            return {
                header: { 
                    klant: document.getElementById('klantNaam').value, 
                    project: document.getElementById('projectNaam').value, 
                    verkoper: document.getElementById('verkoperNaam').value, 
                    adres: document.getElementById('projectAdres').value, 
                    datum: document.getElementById('displayDate').value,
                    btw: document.getElementById('btwSelect').value
                },
                doors: Array.from(document.querySelectorAll('.door-section')).map(s => ({
                    location: s.querySelector('.door-loc').value,
                    type: s.querySelector('.door-type').value,
                    hours: s.querySelector('.door-hours').value,
                    totalPrice: s.querySelector('.door-price').value,
                    notes: s.querySelector('.door-notes').value,
                    items: Array.from(s.querySelectorAll('.art-check:checked')).map(c => c.dataset.n),
                    photos: Array.from(s.querySelectorAll('.photo-preview-img')).map(img => img.src)
                }))
            };
        }

        function autoSave() { localStorage.setItem('inbraakveilig_v3_autosave', JSON.stringify(getFormData())); }
        
        function clearForm() { if(confirm("Offerte volledig wissen?")) { localStorage.removeItem('inbraakveilig_v3_autosave'); location.reload(); } }

        // SLIMME EXPORT KNOP HIER
        function exportHTML() {
            const data = getFormData();
            // Data verstoppen in de script tag bovenaan de pagina
            document.getElementById('saved-data').textContent = JSON.stringify(data);
            
            // Volledige HTML opvragen en downloaden
            const htmlContent = "<!DOCTYPE html>\n<html lang=\"nl\">\n" + document.documentElement.outerHTML + "\n</html>";
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([htmlContent], {type: 'text/html'}));
            a.download = `Offerte_${data.header.klant !== '...' ? data.header.klant : 'Nieuw'}.html`; 
            a.click();
        }

        // SLIMME IMPORT KNOP HIER
        function loadFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => { 
                const content = e.target.result;
                let parsedData = null;
                
                // Ondersteunt zowel oude JSON als nieuwe HTML
                if (file.name.endsWith('.html')) {
                    const match = content.match(/<script id="saved-data" type="application\/json">([\s\S]*?)<\/script>/);
                    if (match && match[1] && match[1].trim() !== '{}') {
                        parsedData = JSON.parse(match[1]);
                    } else { alert("Geen data gevonden in dit HTML bestand."); }
                } else {
                    parsedData = JSON.parse(content);
                }

                if(parsedData) {
                    renderData(parsedData); 
                    autoSave(); 
                }
            };
            reader.readAsText(file);
        }

        function renderData(data) {
            document.getElementById('klantNaam').value = data.header.klant;
            document.getElementById('projectNaam').value = data.header.project;
            document.getElementById('verkoperNaam').value = data.header.verkoper;
            document.getElementById('projectAdres').value = data.header.adres;
            document.getElementById('displayDate').value = data.header.datum;
            if (data.header.btw) document.getElementById('btwSelect').value = data.header.btw;
            
            document.getElementById('doors-container').innerHTML = '';
            if(data.doors) data.doors.forEach(d => addDoor(d));
            
            updateGrandTotal();
        }

        function generateProfessionalPDF() {

            let content = `<div style="font-family:sans-serif; padding:20px;">

                        <h1 style="color:#dc2626; margin:0; text-transform:uppercase; font-size:28px;">INBRAAKVEILIG</h1>
                        <p style="margin:5px 0; font-size:16px;"><strong>Offerte & Opmetingsverslag</strong></p>
                    </div>
                    <div style="text-align:right; font-size:12px; line-height:1.5;">
                        <p style="margin:0;">BTW: BE 0660.598.308</p>
                        <p style="margin:0;">Tel: 052 22 21 35</p>
                    </div>
                </div>

                <div style="background:#fef2f2; padding:15px; border-radius:8px; margin-bottom:30px; font-size:13px;">
                    <p style="margin:0 0 5px 0;"><strong>Klant:</strong> ${data.header.klant} &nbsp;|&nbsp; <strong>Project:</strong> ${data.header.project}</p>
                    <p style="margin:0;"><strong>Adres:</strong> ${data.header.adres} &nbsp;|&nbsp; <strong>Datum:</strong> ${data.header.datum}</p>
                </div>`;

            // Deuren blok
            data.doors.forEach((d, i) => {
                content += `<div style="border:1px solid #ccc; margin-bottom:30px; page-break-inside: avoid; border-radius:10px; overflow:hidden;">
                    <div style="background:#dc2626; color:white; padding:10px; font-weight:bold;">DEUR ${i+1}: ${d.location}</div>
                    <div style="padding:15px;">
                        <table style="width:100%; border-collapse:collapse; font-size:12px;">
                            ${d.items.map(n => {
                                const art = artikelen.find(a => a.n === n);
                                return `<tr><td style="padding:5px; border-bottom:1px solid #eee;">${art.n} - ${art.d}</td><td style="text-align:right;">€ ${art.p.toFixed(2).replace('.', ',')}</td></tr>`;
                            }).join('')}
                        </table>
                        <div style="margin-top:15px; background:#f9f9f9; padding:10px; border-radius:5px;">
                            <p><strong>Totaal Deur: <span style="color:#15803d;">${d.totalPrice}</span></strong></p>
                            <p><strong>Nota:</strong> ${d.notes}</p>
                        </div>
                    </div>`;
                if(d.photos && d.photos.length > 0) {
                    content += `<div style="padding:15px; display:flex; flex-wrap:wrap; gap:10px; background:#f0f0f0;">`;
                    d.photos.forEach(src => content += `<img src="${src}" style="width:45%; max-height:250px; object-fit:cover; border-radius:5px;">`);
                    content += `</div>`;
                }
                content += `</div>`;
            });

            // Offerte Totaal Blok
            content += `
                <div style="margin-top:40px; border:2px solid #15803d; border-radius:8px; padding:20px; page-break-inside:avoid; width:350px; margin-left:auto; background:#f0fdf4;">
                    <h3 style="color:#15803d; margin-top:0; border-bottom:1px solid #15803d; padding-bottom:10px; text-transform:uppercase;">Offerte Totaal</h3>
                    <table style="width:100%; font-size:14px; text-align:right;">
                        <tr><td style="text-align:left; padding-bottom:5px;">Totaal Excl. BTW:</td><td>${document.getElementById('sumExcl').innerText}</td></tr>
                        <tr><td style="text-align:left; padding-bottom:5px;">BTW (${document.getElementById('sumBtwLabel').innerText}):</td><td>${document.getElementById('sumBtw').innerText}</td></tr>
                        <tr style="font-weight:bold; font-size:18px; color:#15803d;">
                            <td style="text-align:left; padding-top:10px; border-top:2px solid #15803d;">Totaal Incl. BTW:</td>
                            <td style="padding-top:10px; border-top:2px solid #15803d;">${document.getElementById('sumIncl').innerText}</td>
                        </tr>
                    </table>
                </div>
            </div>`;

            element.innerHTML = content;
            html2pdf().from(element).set({ margin: 5, filename: `Offerte_${data.header.klant}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).save();
        }

        window.onload = () => {
            // Slimme laadfunctie: checkt eerst of het bestand data bevat
            const embeddedData = document.getElementById('saved-data').textContent;
            
            if (embeddedData && embeddedData.trim() !== "{}" && embeddedData.trim() !== "") {
                renderData(JSON.parse(embeddedData));
            } else {
                const saved = localStorage.getItem('inbraakveilig_v3_autosave');
                if (saved) renderData(JSON.parse(saved));
                else { 
                    const d = new Date(); 
                    document.getElementById('displayDate').value = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
                    addDoor(); 
                }
            }

            document.addEventListener('focusin', e => {
                if (e.target.tagName === 'INPUT' && e.target.value === '...') e.target.value = '';
            });

            document.addEventListener('focusout', e => {
                if (e.target.tagName === 'INPUT' && e.target.value.trim() === '') {
                    e.target.value = '...';
                    if (e.target.classList.contains('door-loc')) updateDoorTitle(e.target);
                    autoSave();
                }
            });
        };
    </script>
</body>
</html>
